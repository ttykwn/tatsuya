<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA World Cup 2026 予想ツール</title>
<style>
:root {
  --bg: #0f1118;
  --card: #181b26;
  --border: #252839;
  --accent: #c9ab52;
  --text: #dde0ea;
  --muted: #6a7090;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

header {
  background: var(--card);
  padding: 14px 20px 12px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}
header h1 { font-size: 1.3rem; color: var(--text); font-weight: 600; letter-spacing: 0.02em; }
header p { color: var(--muted); font-size: 0.78rem; margin-top: 3px; }

.tabs {
  display: flex;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  position: sticky; top: 0; z-index: 100;
}
.tab {
  padding: 12px 18px;
  cursor: pointer;
  color: var(--muted);
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  font-size: 0.9rem;
  transition: all 0.2s;
  flex-shrink: 0;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover { color: var(--text); }

.tab-pane { display: none; padding: 16px; }
.tab-pane.active { display: block; }

/* Groups */
.groups-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  grid-auto-rows: minmax(200px, auto);
  gap: 12px;
}
.group-card {
  cursor: pointer;
  transition: border-color 0.15s, box-shadow 0.15s;
  display: flex; flex-direction: column;
  overflow: hidden;
}
/* Selected card: 1 row for standings + 2 rows for the score panel = span 3, no scroll */
.group-card.selected {
  grid-row: span 3;
  border-color: var(--accent);
  cursor: default;
}
.group-card .matches { display: none; }
.group-card.selected .matches { display: block; flex: 1; }
.group-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.group-head {
  background: rgba(255,255,255,0.04);
  padding: 8px 14px;
  display: flex; align-items: center; justify-content: space-between;
  user-select: none; gap: 8px;
  border-bottom: 1px solid var(--border);
}
.group-card:hover .group-head { background: rgba(255,255,255,0.07); }
.group-head span { font-size: 0.95rem; font-weight: 600; color: var(--text); }
.group-head small { font-size: 0.7rem; color: var(--muted); }

/* Matches panel (inside score-panel only) */
.matches { border-top: 1px solid var(--border); padding: 6px 6px 8px; }
.team-list { padding: 6px; }
.team-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px;
  border-radius: 7px;
  margin-bottom: 3px;
  user-select: none;
  border: 1px solid transparent;
  transition: background 0.15s;
}
.team-row:last-child { margin-bottom: 0; }
.team-row.rank-1 { border-left: 3px solid rgba(60,180,80,0.6); }
.team-row.rank-2 { border-left: 3px solid rgba(70,120,220,0.5); }
.team-row.rank-3 { border-left: 3px solid rgba(190,155,40,0.5); }
.team-row.rank-4 { border-left: 3px solid rgba(180,60,60,0.4); }
.team-row.drag-over { outline: 2px solid var(--accent); }
.rank-num {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: bold; flex-shrink: 0;
  background: rgba(255,255,255,0.1);
}
.team-flag { font-size: 1.2rem; flex-shrink: 0; line-height: 1; }
.team-name { font-size: clamp(0.6rem, 3vw, 0.82rem); flex: 1; white-space: nowrap; overflow: hidden; }
.team-stat { font-size: 0.65rem; color: var(--muted); margin-left: 4px; white-space: nowrap; flex-shrink: 0; }
.adv-mark { font-size: 0.6rem; color: var(--accent); padding: 1px 5px; border: 1px solid var(--accent); border-radius: 8px; white-space: nowrap; flex-shrink: 0; }

/* Matches inside group card */
.match-row { padding: 5px 4px; border-bottom: 1px dashed rgba(255,255,255,0.06); }
.match-row:last-child { border-bottom: none; }
.md-tag {
  display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
  font-size: 0.6rem; color: var(--muted); margin-bottom: 4px;
  padding: 0 2px;
}
.md-md { font-weight: bold; color: var(--accent); letter-spacing: 0.04em; }
.md-date { color: var(--text); font-size: 0.62rem; }
.md-venue { margin-left: auto; font-size: 0.6rem; opacity: 0.85; }
.match-line { display: flex; align-items: center; gap: 3px; }
.mt { display: flex; align-items: center; gap: 3px; flex: 1; min-width: 0; }
.mt.home { justify-content: flex-end; }
.mt.away { justify-content: flex-start; }
/* flag: no shrink, name: full display (no ellipsis, wrap if needed) */
.mt .mflag { font-size: 1rem; flex-shrink: 0; line-height: 1; }
.mt .mname { font-size: clamp(0.55rem, 2vw, 0.72rem); white-space: nowrap; min-width: 0; }
.sc-in {
  width: 30px; height: 28px; text-align: center;
  background: rgba(0,0,0,0.3); border: 1px solid var(--border);
  border-radius: 5px; color: var(--text); font-size: 0.9rem;
  font-weight: bold; padding: 0; flex-shrink: 0;
  -moz-appearance: textfield;
}
.sc-in::-webkit-outer-spin-button, .sc-in::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.sc-in:focus { outline: none; border-color: var(--accent); }
.sc-sep { color: var(--muted); font-size: 0.7rem; flex-shrink: 0; }
/* Bracket match info header */
.bmatch-info {
  font-size: 0.58rem; color: var(--muted);
  padding: 3px 8px; border-bottom: 1px solid var(--border);
  display: flex; gap: 6px; align-items: center;
}
.bmatch-jst { color: var(--text); }
.wdl-btn {
  border: 1px solid var(--border); border-radius: 5px;
  background: transparent; color: var(--muted);
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
.wdl-btn:hover { border-color: rgba(200,168,75,0.5); color: var(--text); }
.wdl-btn.wdl-active { border-color: var(--accent); color: var(--accent); background: rgba(200,168,75,0.12); font-weight: bold; }
/* Team winner button: stacked flag + name, fills available space */
.wdl-team { flex: 1; min-width: 0; flex-direction: column; gap: 2px; padding: 4px 3px; }
.wl-badge {
  position: absolute; top: 2px; right: 3px;
  font-size: 0.42rem; font-weight: 700; line-height: 1; pointer-events: none;
}
.wl-win { color: var(--accent); }
.wl-lose { color: var(--muted); opacity: 0.7; }
.wdl-flag { font-size: 1.1rem; line-height: 1; flex-shrink: 0; }
.wdl-name { font-size: clamp(0.5rem, 1.6vw, 0.63rem); white-space: nowrap; }
/* Draw button: compact, fixed */
.wdl-draw { padding: 4px 5px; font-size: 0.58rem; white-space: nowrap; flex-shrink: 0; }

/* Third place */
.third-wrap { max-width: 750px; margin: 0 auto; }
.section-title { font-size: 1rem; color: var(--accent); margin-bottom: 6px; }
.section-sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 14px; }
.counter-badge {
  display: inline-block; padding: 3px 12px;
  border-radius: 20px; border: 1px solid var(--border);
  font-size: 0.8rem; margin-bottom: 14px;
}
.counter-badge.done { border-color: var(--accent); color: var(--accent); }
.third-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 8px;
}
.third-card {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  background: var(--card); border: 2px solid var(--border);
  border-radius: 8px; cursor: pointer; transition: all 0.2s;
}
.third-card:hover { border-color: rgba(200,168,75,0.4); }
.third-card.selected { border-color: var(--accent); background: rgba(200,168,75,0.08); }
.third-card.disabled { opacity: 0.35; cursor: not-allowed; }
.third-info { flex: 1; }
.third-name { font-size: 0.8rem; font-weight: 500; }
.third-grp { font-size: 0.7rem; color: var(--muted); }
.third-check { color: var(--accent); visibility: hidden; }
.third-card.selected .third-check { visibility: visible; }

/* Bracket */
.bracket-wrap { overflow-x: auto; padding-bottom: 10px; }
.bracket {
  display: flex;
  gap: 0;
  min-width: 960px;
  align-items: stretch;
}
.bround {
  display: flex; flex-direction: column;
  flex: 1; min-width: 150px;
}
.bround-head {
  text-align: center; padding: 7px 4px;
  font-size: 0.65rem; color: var(--accent);
  font-weight: bold; letter-spacing: 0.08em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
}
.bmatches {
  display: flex; flex-direction: column;
  justify-content: space-around;
  flex: 1; gap: 6px; padding: 0 4px;
}
.bmatch {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 7px; overflow: hidden;
}
.bteam {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 8px; cursor: pointer; min-height: 34px;
  transition: background 0.15s; position: relative;
}
.bteam:hover { background: rgba(255,255,255,0.04); }
.bteam:first-child { border-bottom: 1px solid var(--border); }
.bteam.winner { background: rgba(255,255,255,0.05); }
.bteam.loser { opacity: 0.38; }
.bt-flag { font-size: 0.95rem; flex-shrink: 0; }
.bt-name { font-size: 0.72rem; flex: 1; line-height: 1.2; }
.bt-empty { color: var(--muted); font-size: 0.7rem; font-style: italic; }
.bt-badge { font-size: 0.62rem; font-weight: 700; margin-left: auto; flex-shrink: 0; }

/* Final / Champion */
.final-col {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-width: 160px; padding: 0 8px; gap: 10px;
}
.champion-box {
  background: var(--card);
  border: 2px solid var(--accent);
  border-radius: 10px; padding: 14px 10px;
  text-align: center; width: 100%;
}
.champion-box .trophy { font-size: 1.8rem; }
.champ-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
.champ-name { font-size: 0.9rem; color: var(--accent); font-weight: bold; margin-top: 4px; min-height: 1.2em; }
.third-place-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px; text-align: center; width: 100%;
}
.tp-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; }
.tp-name { font-size: 0.75rem; margin-top: 3px; min-height: 1em; }
.final-match-wrap { width: 100%; }

/* Share */
.share-wrap { max-width: 560px; margin: 0 auto; }
.share-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 18px; margin-bottom: 14px;
}
.share-card h3 { font-size: 0.9rem; margin-bottom: 10px; }
.url-box {
  background: rgba(0,0,0,0.3); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px; font-size: 0.7rem;
  color: var(--muted); word-break: break-all;
  max-height: 72px; overflow-y: auto; margin-bottom: 10px;
}
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: 7px; border: none;
  cursor: pointer; font-size: 0.85rem; font-weight: 500;
  transition: all 0.2s;
}
.btn-gold { background: var(--accent); color: #000; }
.btn-gold:hover { background: #dbb85a; }
.btn-ghost { background: var(--border); color: var(--text); margin-right: 8px; }
.btn-ghost:hover { background: #3a4060; }
.btn-x { background: #000; color: #fff; border: 1px solid #333; margin-left: 8px; }
.btn-x:hover { background: #1a1a1a; }
.copy-ok { color: var(--accent); font-size: 0.8rem; margin-top: 6px; display: none; }
.reset-btn { color: #e04040; background: none; border: 1px solid #e04040; font-size: 0.8rem; padding: 6px 14px; border-radius: 6px; cursor: pointer; }
.reset-btn:hover { background: rgba(224,64,64,0.1); }
.auto-predict-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
.btn-auto {
  background: transparent; color: var(--accent);
  border: 1px solid var(--accent);
  padding: 7px 14px; border-radius: 6px;
  cursor: pointer; font-size: 0.8rem; font-weight: 500;
  transition: all 0.2s;
}
.btn-auto:hover { background: rgba(201,171,82,0.1); }
.auto-predict-hint { font-size: 0.7rem; color: var(--muted); }

.zoom-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.zoom-btn { background: transparent; border: 1px solid var(--border); color: var(--text); min-width: 28px; height: 28px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; display: inline-flex; align-items: center; justify-content: center; padding: 0 6px; }
.zoom-btn:hover { border-color: var(--accent); color: var(--accent); }
.zoom-label { font-size: 0.75rem; color: var(--muted); min-width: 36px; text-align: center; }

@media (max-width: 600px) {
  header h1 { font-size: 1.2rem; }
  .groups-grid { grid-template-columns: repeat(2, 1fr); }
  .bracket { min-width: 800px; }
  /* Hide pts/GD and subtitle on narrow cards to prevent wrapping */
  .team-stat { display: none; }
  .group-head small { display: none; }
  /* Expand selected card to full width so score panel has room for team names */
  .group-card.selected { grid-column: 1 / -1; }
  /* Abbreviate advancement badge to checkmark only */
  .adv-label { display: none; }
}
@media (max-width: 380px) {
  .groups-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <h1>FIFA World Cup 2026 予想ツール</h1>
  <p>USA / Canada / Mexico &nbsp;|&nbsp; 48チーム・12グループ</p>
</header>

<nav class="tabs">
  <div class="tab active" onclick="showTab('groups')">グループステージ</div>
  <div class="tab" onclick="showTab('bracket')">決勝トーナメント</div>
  <div class="tab" onclick="showTab('share')">共有</div>
</nav>

<div id="tab-groups" class="tab-pane active">
  <div class="auto-predict-bar">
    <button class="btn-auto" onclick="autoPredictGroups()">🎲 自動予想</button>
    <button class="reset-btn" onclick="resetAll()">🔄 予想リセット</button>
  </div>
  <div style="font-size:0.75rem;color:var(--muted);margin-bottom:10px;">グループをクリックするとスコア入力欄がその場で展開します。<span id="thirdCounter" style="margin-left:6px;">完了グループ 0/12 ・ 3位通過 0/8</span></div>
  <div class="groups-grid" id="groupsGrid"></div>
</div>

<div id="tab-bracket" class="tab-pane">
  <div class="auto-predict-bar">
    <button class="btn-auto" onclick="autoPredictBracket()">🎲 自動予想</button>
    <button class="reset-btn" onclick="resetAll()">🔄 予想リセット</button>
  </div>
  <div style="font-size:0.75rem;color:var(--muted);margin-bottom:10px;">チームをクリックして勝者を選択。もう一度クリックで解除。</div>
  <div class="zoom-bar">
    <button class="zoom-btn" onclick="zoomBracket(-0.1)">－</button>
    <span class="zoom-label" id="zoomLabel">100%</span>
    <button class="zoom-btn" onclick="zoomBracket(+0.1)">＋</button>
    <button class="zoom-btn" onclick="resetZoom()" style="font-size:0.7rem;padding:0 8px;">リセット</button>
  </div>
  <div class="bracket-wrap">
    <div class="bracket" id="bracket"></div>
  </div>
</div>

<div id="tab-share" class="tab-pane">
  <div class="share-wrap">
    <div class="share-card">
      <h3>予想を共有する</h3>
      <div class="url-box" id="shareUrl">（ここにURLが生成されます）</div>
      <button class="btn btn-gold" onclick="copyUrl()">📋 URLをコピー</button>
      <button class="btn btn-x" onclick="postToX()">𝕏 Xでポスト</button>
      <div class="copy-ok" id="copyOk">✓ コピーしました！</div>
    </div>
    <div class="share-card">
      <h3>リセット</h3>
      <p style="font-size:0.8rem;color:var(--muted);margin-bottom:10px;">全ての予想をリセットします。</p>
      <button class="reset-btn" onclick="resetAll()">🔄 全リセット</button>
    </div>
  </div>
</div>

<script>
// ===== DATA =====
const GROUPS = {
  A: [{n:'メキシコ',f:'🇲🇽'},{n:'韓国',f:'🇰🇷'},{n:'南アフリカ',f:'🇿🇦'},{n:'チェコ',f:'🇨🇿'}],
  B: [{n:'カナダ',f:'🇨🇦'},{n:'スイス',f:'🇨🇭'},{n:'カタール',f:'🇶🇦'},{n:'ボスニア',f:'🇧🇦'}],
  C: [{n:'ブラジル',f:'🇧🇷'},{n:'モロッコ',f:'🇲🇦'},{n:'ハイチ',f:'🇭🇹'},{n:'スコットランド',f:'🏴󠁧󠁢󠁳󠁣󠁴󠁿'}],
  D: [{n:'アメリカ',f:'🇺🇸'},{n:'オーストラリア',f:'🇦🇺'},{n:'パラグアイ',f:'🇵🇾'},{n:'トルコ',f:'🇹🇷'}],
  E: [{n:'ドイツ',f:'🇩🇪'},{n:'エクアドル',f:'🇪🇨'},{n:'コートジボワール',f:'🇨🇮'},{n:'キュラソー',f:'🇨🇼'}],
  F: [{n:'オランダ',f:'🇳🇱'},{n:'日本',f:'🇯🇵'},{n:'チュニジア',f:'🇹🇳'},{n:'スウェーデン',f:'🇸🇪'}],
  G: [{n:'ベルギー',f:'🇧🇪'},{n:'イラン',f:'🇮🇷'},{n:'ニュージーランド',f:'🇳🇿'},{n:'エジプト',f:'🇪🇬'}],
  H: [{n:'スペイン',f:'🇪🇸'},{n:'サウジアラビア',f:'🇸🇦'},{n:'ウルグアイ',f:'🇺🇾'},{n:'カーボベルデ',f:'🇨🇻'}],
  I: [{n:'フランス',f:'🇫🇷'},{n:'ノルウェー',f:'🇳🇴'},{n:'セネガル',f:'🇸🇳'},{n:'イラク',f:'🇮🇶'}],
  J: [{n:'アルゼンチン',f:'🇦🇷'},{n:'オーストリア',f:'🇦🇹'},{n:'アルジェリア',f:'🇩🇿'},{n:'ヨルダン',f:'🇯🇴'}],
  K: [{n:'ポルトガル',f:'🇵🇹'},{n:'コロンビア',f:'🇨🇴'},{n:'コンゴ',f:'🇨🇩'},{n:'ウズベキスタン',f:'🇺🇿'}],
  L: [{n:'イングランド',f:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},{n:'クロアチア',f:'🇭🇷'},{n:'ガーナ',f:'🇬🇭'},{n:'パナマ',f:'🇵🇦'}],
};
const GKEYS = ['A','B','C','D','E','F','G','H','I','J','K','L'];

// Team strength ratings (FIFA ranking + recent form). Used for auto-predict.
const TEAM_STRENGTH = {
  'メキシコ': 80, '韓国': 70, '南アフリカ': 60, 'チェコ': 65,
  'カナダ': 75, 'スイス': 79, 'カタール': 62, 'ボスニア': 68,
  'ブラジル': 89, 'モロッコ': 82, 'ハイチ': 50, 'スコットランド': 64,
  'アメリカ': 79, 'オーストラリア': 72, 'パラグアイ': 66, 'トルコ': 70,
  'ドイツ': 85, 'エクアドル': 74, 'コートジボワール': 68, 'キュラソー': 50,
  'オランダ': 86, '日本': 81, 'チュニジア': 68, 'スウェーデン': 76,
  'ベルギー': 84, 'イラン': 70, 'ニュージーランド': 60, 'エジプト': 69,
  'スペイン': 91, 'サウジアラビア': 62, 'ウルグアイ': 81, 'カーボベルデ': 58,
  'フランス': 92, 'ノルウェー': 82, 'セネガル': 77, 'イラク': 62,
  'アルゼンチン': 89, 'オーストリア': 72, 'アルジェリア': 68, 'ヨルダン': 60,
  'ポルトガル': 87, 'コロンビア': 82, 'コンゴ': 62, 'ウズベキスタン': 65,
  'イングランド': 88, 'クロアチア': 81, 'ガーナ': 69, 'パナマ': 62,
};

// Match fixtures: [homeTeamIdx, awayTeamIdx, date, matchday, jstTime, venue]
// Indexes correspond to GROUPS[g] order
// Dates / times / venues are based on FIFA's announced match-slot schedule
// [homeIdx, awayIdx, date(local), matchday, jstTime(approx), venue]
const GROUP_MATCHES = {
  // A: Mexico(0) SouthKorea(1) SouthAfrica(2) Czechia(3)  ← pot order
  A: [
    [0,2,'6/11','MD1','04:00','メキシコシティ'],   // Mexico vs SouthAfrica
    [1,3,'6/11','MD1','07:00','グアダラハラ'],      // SouthKorea vs Czechia
    [3,2,'6/18','MD2','04:00','アトランタ'],        // Czechia vs SouthAfrica
    [0,1,'6/18','MD2','07:00','グアダラハラ'],      // Mexico vs SouthKorea

// Day-of-week in Japanese for a "M/D" string in 2026
function dayOfWeek(dateStr) {
  const [m, d] = dateStr.split('/').map(Number);
  const dow = new Date(2026, m - 1, d).getDay();
  return ['日','月','火','水','木','金','土'][dow];
}

// ===== STATE =====
// groupScores[g] = array of 6 [homeScore, awayScore] or null for unset
let groupScores = {};
GKEYS.forEach(g => groupScores[g] = new Array(6).fill(null).map(()=>[null,null]));
// groupWdl[g][mi] = 'W'|'D'|'L' (home-team perspective) or null; used when score not entered
let groupWdl = {};
GKEYS.forEach(g => groupWdl[g] = new Array(6).fill(null));
let bracketPicks = new Array(32).fill(null); // 0 or 1 per match index
let autoPredicted = false; // true while current state came purely from auto-predict

// Returns effective result for a match: score-derived if score set, else stored WDL, else null
function getEffectiveResult(g, mi) {
  const sc = groupScores[g][mi];
  if (sc[0] !== null && sc[1] !== null)
    return sc[0] > sc[1] ? 'W' : sc[0] < sc[1] ? 'L' : 'D';
  return groupWdl[g][mi];
}

// ===== STANDINGS CALCULATION =====
// Returns array of 4 objects sorted by standing: {idx, pts, gd, gf, ga, w, d, l}
function getStandings(g) {
  const stats = [0,1,2,3].map(i => ({idx:i, pts:0, gd:0, gf:0, ga:0, w:0, d:0, l:0}));
  GROUP_MATCHES[g].forEach((m, mi) => {
    const sc = groupScores[g][mi];
    const hasScore = sc[0] !== null && sc[1] !== null;
    const [h, a] = [m[0], m[1]];
    if (hasScore) {
      stats[h].gf += sc[0]; stats[h].ga += sc[1];
      stats[a].gf += sc[1]; stats[a].ga += sc[0];
      if (sc[0] > sc[1]) { stats[h].pts += 3; stats[h].w++; stats[a].l++; }
      else if (sc[0] < sc[1]) { stats[a].pts += 3; stats[a].w++; stats[h].l++; }
      else { stats[h].pts++; stats[a].pts++; stats[h].d++; stats[a].d++; }
    } else {
      const wdl = groupWdl[g][mi];
      if (!wdl) return;
      // WDL-only: pts contributed but no GD/GF/GA
      if (wdl === 'W') { stats[h].pts += 3; stats[h].w++; stats[a].l++; }
      else if (wdl === 'L') { stats[a].pts += 3; stats[a].w++; stats[h].l++; }
      else { stats[h].pts++; stats[a].pts++; stats[h].d++; stats[a].d++; }
    }
  });
  stats.forEach(s => s.gd = s.gf - s.ga);
  // FIFA tiebreakers: pts, gd, gf, then stable by original idx
  stats.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.idx - b.idx);
  return stats;
}

// Returns true if all 6 matches have a score OR a WDL result
function isGroupComplete(g) {
  return GROUP_MATCHES[g].every((_, mi) => {
    const sc = groupScores[g][mi];
    return (sc[0] !== null && sc[1] !== null) || groupWdl[g][mi] !== null;
  });
}

// Returns array of group keys whose 3rd-place team advances (best 8 of 12)
function getThirdAdvancing() {
  const all = GKEYS.filter(isGroupComplete).map(g => {
    const s = getStandings(g)[2];
    return {g, pts:s.pts, gd:s.gd, gf:s.gf};
  });
  all.sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.g.localeCompare(b.g));
  return all.slice(0, 8).map(x => x.g);
}

// ===== HELPERS =====
function getTeam(slot) {
  if (!slot) return null;
  if (slot.startsWith('t3')) {
    const i = parseInt(slot.slice(2));
    const advancing = getThirdAdvancing();
    if (i >= advancing.length) return null;
    const g = advancing[i];
    const idx = getStandings(g)[2].idx;
    return GROUPS[g][idx];
  }
  const pos = parseInt(slot[0]) - 1;
  const g = slot[1];
  if (!isGroupComplete(g)) return null;
  const idx = getStandings(g)[pos].idx;
  return GROUPS[g][idx];
}

// Match tree: R32(0-15), R16(16-23), QF(24-27), SF(28-29), Final(30), 3rd(31)
function getMatchTeams(matchIdx) {
  if (matchIdx < 16) {
    const def = R32_DEF[matchIdx];
    return [getTeam(def[0]), getTeam(def[1])];
  }
  if (matchIdx < 24) {
    const base = (matchIdx - 16) * 2;
    return [getWinner(base), getWinner(base + 1)];
  }
  if (matchIdx < 28) {
    const base = 16 + (matchIdx - 24) * 2;
    return [getWinner(base), getWinner(base + 1)];
  }
  if (matchIdx === 28) return [getWinner(24), getWinner(25)];
  if (matchIdx === 29) return [getWinner(26), getWinner(27)];
  if (matchIdx === 30) return [getWinner(28), getWinner(29)];
  if (matchIdx === 31) return [getLoser(28), getLoser(29)];
  return [null, null];
}

function getWinner(matchIdx) {
  const pick = bracketPicks[matchIdx];
  if (pick === null) return null;
  return getMatchTeams(matchIdx)[pick];
}

function getLoser(matchIdx) {
  const pick = bracketPicks[matchIdx];
  if (pick === null) return null;
  return getMatchTeams(matchIdx)[1 - pick];
}

// Invalidate dependent picks when a team in a match changes
function clearDependentPicks(matchIdx) {
  const deps = getDependentMatches(matchIdx);
  deps.forEach(i => {
    if (bracketPicks[i] !== null) {
      bracketPicks[i] = null;
      clearDependentPicks(i);
    }
  });
}

function getDependentMatches(matchIdx) {
  if (matchIdx < 16) return [16 + Math.floor(matchIdx / 2)];
  if (matchIdx < 24) return [24 + Math.floor((matchIdx - 16) / 2)];
  if (matchIdx < 28) return [28 + Math.floor((matchIdx - 24) / 2)];
  if (matchIdx === 28 || matchIdx === 29) return [30, 31];
  return [];
}

      <div class="md-tag">
        <span class="md-md">${m[3]}</span>
        <span class="md-date">${m[2]}(${dow}) ${m[4]}(JST)</span>
        <span class="md-venue">${m[5]}</span>
      </div>

        <button class="wdl-btn wdl-team${r==='W'?' wdl-active':''}" data-g="${g}" data-mi="${mi}" data-r="W">
          <span class="wdl-flag">${th.f}</span><span class="wdl-name">${th.n}</span>
          ${r==='W'?'<span class="wl-badge wl-win">Win</span>':r==='L'?'<span class="wl-badge wl-lose">Lose</span>':''}
        </button>

  return `<div class="group-card${isSel ? ' selected' : ''}" data-g="${g}">
    <div class="group-head">
      <span>グループ ${g}</span>

function updateWdlBadges(g, mi, r) {
  ['W', 'L'].forEach(side => {
    const btn = document.querySelector(`.wdl-btn[data-g="${g}"][data-mi="${mi}"][data-r="${side}"]`);
    if (!btn) return;
    let badge = btn.querySelector('.wl-badge');
    const win = side === 'W' ? r === 'W' : r === 'L';
    const lose = side === 'W' ? r === 'L' : r === 'W';
    if (win || lose) {
      if (!badge) { badge = document.createElement('span'); btn.appendChild(badge); }
      badge.textContent = win ? 'Win' : 'Lose';
      badge.className = `wl-badge ${win ? 'wl-win' : 'wl-lose'}`;
    } else if (badge) {
      badge.remove();
    }
  });
}

      document.querySelectorAll(`.sc-in[data-g="${g}"][data-mi="${mi}"]`).forEach(inp => inp.value = '');
      // Toggle: click active button again to deselect
      groupWdl[g][mi] = groupWdl[g][mi] === r ? null : r;
      document.querySelectorAll(`.wdl-btn[data-g="${g}"][data-mi="${mi}"]`).forEach(b => {
        b.classList.toggle('wdl-active', b.dataset.r === groupWdl[g][mi]);
      });
      updateWdlBadges(g, mi, groupWdl[g][mi]);
      bracketPicks = new Array(32).fill(null);
      autoPredicted = false;
      GKEYS.forEach(gk => updateStandingsDom(gk));
      updateThirdCounter();
      renderBracket();
      saveState();
    });
  });
}

function updateStandingsDom(g) {
  const card = document.querySelector(`.group-card[data-g="${g}"]`);
  if (!card) return;
  const complete = isGroupComplete(g);
  const standings = getStandings(g);
  const thirdAdv = getThirdAdvancing().includes(g);
  const rows = standings.map((s, pos) => {
    const t = GROUPS[g][s.idx];
    const cls = ['rank-1','rank-2','rank-3','rank-4'][pos];
    let note = '';
    if (complete) {
      if (pos <= 1) note = '<span class="adv-mark">✓<span class="adv-label">進出</span></span>';
      else if (pos === 2 && thirdAdv) note = '<span class="adv-mark">✓<span class="adv-label">進出</span></span>';
    }
    return `<div class="team-row ${cls}">
      <span class="rank-num">${pos+1}</span>
      <span class="team-flag">${t.f}</span>
      <span class="team-name">${t.n}</span>
      ${note}
      <span class="team-stat">${s.pts}pt ${s.gd>=0?'+':''}${s.gd}</span>
    </div>`;
  }).join('');
  card.querySelector('.team-list').innerHTML = rows;
  const head = card.querySelector('.group-head small');
  head.textContent = complete ? '予想完了' : '未入力';
}

function updateThirdCounter() {
  const counter = document.getElementById('thirdCounter');
  if (counter) {
    const n = getThirdAdvancing().length;
    const completedGroups = GKEYS.filter(isGroupComplete).length;
    counter.textContent = `完了グループ ${completedGroups}/12 ・ 3位通過 ${n}/8`;
    counter.style.color = completedGroups === 12 ? 'var(--accent)' : 'var(--muted)';
  }
}

// ===== RENDER BRACKET =====
function renderBracket() {
  const el = document.getElementById('bracket');

  // Left R32 (0-7), Left R16 (16-19), Left QF (24-25), Left SF (28)
  // Right R32 (8-15), Right R16 (20-23), Right QF (26-27), Right SF (29)
  // Final (30), 3rd (31)

  const leftR32  = [0,1,2,3,4,5,6,7];
  const leftR16  = [16,17,18,19];
  const leftQF   = [24,25];
  const leftSF   = [28];
  const rightR32 = [8,9,10,11,12,13,14,15];
  const rightR16 = [20,21,22,23];
  const rightQF  = [26,27];
  const rightSF  = [29];

  el.innerHTML = [
    makeRoundCol('ラウンド32', leftR32),
    makeRoundCol('ラウンド16', leftR16),
    makeRoundCol('準々決勝', leftQF),
    makeRoundCol('準決勝', leftSF),
    makeFinalCol(),
    makeRoundCol('準決勝', rightSF),
    makeRoundCol('準々決勝', rightQF),
    makeRoundCol('ラウンド16', rightR16),
    makeRoundCol('ラウンド32', rightR32),
  ].join('');

  document.querySelectorAll('.bteam[data-match]').forEach(el => {
    el.addEventListener('click', () => {
      const mi = parseInt(el.dataset.match);
      const side = parseInt(el.dataset.side);
      if (el.classList.contains('winner')) {
        bracketPicks[mi] = null;
        clearDependentPicks(mi);
      } else {
        const [t1, t2] = getMatchTeams(mi);
        if (!t1 || !t2) return;
        bracketPicks[mi] = side;
        clearDependentPicks(mi);
      }
      autoPredicted = false;
      renderBracket();
      saveState();
    });
  });
}

function makeRoundCol(title, matchIndices) {
  const matches = matchIndices.map(mi => {
    const [t1, t2] = getMatchTeams(mi);
    const sch = BRACKET_SCHEDULE[mi];
    return `<div class="bmatch">
      <div class="bmatch-info"><span class="bmatch-jst">${sch.date} ${sch.jst}(JST)</span><span>${sch.venue}</span></div>
      ${makeTeamSlot(t1, mi, 0)}
      ${makeTeamSlot(t2, mi, 1)}
    </div>`;
  }).join('');
  return `<div class="bround">
    <div class="bround-head">${title}</div>
    <div class="bmatches">${matches}</div>
  </div>`;
}

function makeTeamSlot(team, mi, side) {
  const pick = bracketPicks[mi];
  if (!team) {
    return `<div class="bteam" data-match="${mi}" data-side="${side}">
      <span class="bt-empty">TBD</span>
    </div>`;
  }
  let cls = '';
  if (pick === side) cls = 'winner';
  else if (pick !== null) cls = 'loser';
  return `<div class="bteam ${cls}" data-match="${mi}" data-side="${side}">
    <span class="bt-flag">${team.f}</span>
    <span class="bt-name">${team.n}</span>
    ${pick === side ? '<span class="bt-badge wl-win">Win</span>' : pick !== null ? '<span class="bt-badge wl-lose">Lose</span>' : ''}
  </div>`;
}

function makeFinalCol() {
  const champion = getWinner(30);
  const third = getWinner(31);
  const [ft1, ft2] = getMatchTeams(30);
  const [tp1, tp2] = getMatchTeams(31);
  const fSch = BRACKET_SCHEDULE[30];
  const tSch = BRACKET_SCHEDULE[31];
  return `<div class="final-col">
    <div class="champion-box">
      <div class="trophy">🏆</div>
      <div class="champ-label">優勝</div>
      <div class="champ-name">${champion ? champion.f+' '+champion.n : '—'}</div>
    </div>
    <div class="final-match-wrap">
      <div class="bround-head" style="margin-bottom:4px">決勝</div>
      <div class="bmatch">
        <div class="bmatch-info"><span class="bmatch-jst">${fSch.date} ${fSch.jst}(JST)</span><span>${fSch.venue}</span></div>
        ${makeTeamSlot(ft1, 30, 0)}
        ${makeTeamSlot(ft2, 30, 1)}
      </div>
    </div>
    <div class="final-match-wrap">
      <div class="bround-head" style="margin-bottom:4px">3位決定戦</div>
      <div class="bmatch">
        <div class="bmatch-info"><span class="bmatch-jst">${tSch.date} ${tSch.jst}(JST)</span><span>${tSch.venue}</span></div>
        ${makeTeamSlot(tp1, 31, 0)}
        ${makeTeamSlot(tp2, 31, 1)}
      </div>
    </div>
    <div class="third-place-box">
      <div class="tp-label">3位</div>
      <div class="tp-name">${third ? third.f+' '+third.n : '—'}</div>
    </div>
  </div>`;
}

// ===== SHARE =====
// Encode each group's 6 matches: "2-1" for score, "W"/"D"/"L" for WDL-only, "" for empty
function encodeScores() {
  return GKEYS.map(g => groupScores[g].map((sc, mi) => {
    if (sc[0] !== null && sc[1] !== null) return sc[0] + '-' + sc[1];
    return groupWdl[g][mi] || '';
  }).join(',')).join('|');
}
function decodeScores(s) {
  const scores = {}, wdl = {};
  const parts = s.split('|');
  GKEYS.forEach((g, i) => {
    scores[g] = new Array(6).fill(null).map(() => [null, null]);
    wdl[g] = new Array(6).fill(null);
    if (!parts[i]) return;
    parts[i].split(',').forEach((m, mi) => {
      if (!m) return;
      if (m === 'W' || m === 'D' || m === 'L') {
        wdl[g][mi] = m;
      } else {
        const [a, b] = m.split('-').map(Number);
        if (!isNaN(a) && !isNaN(b)) scores[g][mi] = [a, b];
      }
    });
  });
  return { scores, wdl };
}

function generateUrl() {
  const data = { s: encodeScores(), b: bracketPicks };
  const json = JSON.stringify(data);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  return location.href.split('?')[0] + '?p=' + b64;
}

function loadFromUrl() {
  const params = new URLSearchParams(location.search);
  const p = params.get('p');
  if (!p) return;
  try {
    const json = decodeURIComponent(escape(atob(p)));
    const data = JSON.parse(json);
    if (data.s) { const d = decodeScores(data.s); groupScores = d.scores; groupWdl = d.wdl; }
    if (data.b) bracketPicks = data.b;
  } catch(e) { console.error('Failed to load state from URL', e); }
}

function saveState() {
  const url = generateUrl();
  document.getElementById('shareUrl').textContent = url;
  try { history.replaceState(null, '', url); } catch(e) {}
}

function copyUrl() {
  const url = generateUrl();
  navigator.clipboard.writeText(url).then(() => {
    const ok = document.getElementById('copyOk');
    ok.style.display = 'block';
    setTimeout(() => ok.style.display = 'none', 2000);
  }).catch(() => {
    prompt('URLをコピーしてください:', url);
  });
}

function resetAll() {
  const hasAny = GKEYS.some(g => GROUP_MATCHES[g].some((_, mi) => {
    const sc = groupScores[g][mi];
    return (sc[0] !== null && sc[1] !== null) || groupWdl[g][mi] !== null;
  })) || bracketPicks.some(p => p !== null);
  if (hasAny && !confirm('全ての予想をリセットしますか？')) return;
  GKEYS.forEach(g => {
    groupScores[g] = new Array(6).fill(null).map(() => [null, null]);
    groupWdl[g] = new Array(6).fill(null);
  });
  bracketPicks = new Array(32).fill(null);
  renderGroups();
  renderBracket();
  saveState();
}

// ===== TABS =====
function showTab(id) {
  document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  const tabs = ['groups','bracket','share'];
  const i = tabs.indexOf(id);
  document.querySelectorAll('.tab')[i].classList.add('active');
  if (id === 'share') saveState();
}

// ===== AUTO PREDICT =====
function poisson(lambda) {
  const L = Math.exp(-lambda);
  let k = 0, p = 1;
  do { k++; p *= Math.random(); } while (p > L);
  return k - 1;
}
function predictScore(s1, s2) {
  const diff = (s1 - s2) / 20;
  const g1 = Math.max(0.3, 1.3 + diff);
  const g2 = Math.max(0.3, 1.3 - diff);
  return [Math.min(poisson(g1), 6), Math.min(poisson(g2), 6)];
}
function hasAnyPredictions() {
  return GKEYS.some(g => GROUP_MATCHES[g].some((_, mi) => {
    const sc = groupScores[g][mi];
    return (sc[0] !== null && sc[1] !== null) || groupWdl[g][mi] !== null;
  })) || bracketPicks.some(p => p !== null);
}
function generateGroupPredictions() {
  GKEYS.forEach(g => {
    GROUP_MATCHES[g].forEach((m, mi) => {
      const home = GROUPS[g][m[0]];
      const away = GROUPS[g][m[1]];
      const hs = TEAM_STRENGTH[home.n] || 50;
      const as = TEAM_STRENGTH[away.n] || 50;
      const [h, a] = predictScore(hs, as);
      groupScores[g][mi] = [h, a];
      groupWdl[g][mi] = null;
    });
  });
}
function generateBracketPredictions() {
  bracketPicks = new Array(32).fill(null);
  for (let mi = 0; mi < 32; mi++) {
    const teams = getMatchTeams(mi);
    if (!teams || !teams[0] || !teams[1]) continue;
    const s1 = TEAM_STRENGTH[teams[0].n] || 50;
    const s2 = TEAM_STRENGTH[teams[1].n] || 50;
    const noise = (Math.random() - 0.5) * 25;
    bracketPicks[mi] = ((s1 - s2) + noise) >= 0 ? 0 : 1;
  }
}
function autoPredictGroups() {
  if (hasAnyPredictions() && !autoPredicted && !confirm('全てのグループステージの予想を自動生成します。現在の予想は上書きされます。')) return;
  generateGroupPredictions();
  bracketPicks = new Array(32).fill(null);
  autoPredicted = true;
  renderGroups();
  renderBracket();
  saveState();
}
function autoPredictBracket() {
  if (hasAnyPredictions() && !autoPredicted && !confirm('グループステージと決勝トーナメントの予想を自動生成します。現在の予想は上書きされます。')) return;
  generateGroupPredictions();
  generateBracketPredictions();
  autoPredicted = true;
  renderGroups();
  renderBracket();
  saveState();
}

// ===== X (Twitter) POST =====
function getJapanFinish() {
  if (!isGroupComplete('F')) return null;
  const standings = getStandings('F');
  const japanPos = standings.findIndex(s => GROUPS['F'][s.idx].n === '日本');
  if (japanPos === 3) return 'group_out';
  if (japanPos === 2 && !getThirdAdvancing().includes('F')) return 'group_out';
  let result = null;
  for (let mi = 0; mi < 32; mi++) {
    const teams = getMatchTeams(mi);
    if (!teams[0] || !teams[1]) continue;
    if (teams[0].n !== '日本' && teams[1].n !== '日本') continue;
    const pick = bracketPicks[mi];
    if (pick === null) continue;
    const winnerIsJapan = (pick === 0 ? teams[0].n : teams[1].n) === '日本';
    if (!winnerIsJapan) {
      if (mi < 16) result = 'r32_out';
      else if (mi < 24) result = 'r16_out';
      else if (mi < 28) result = 'qf_out';
      else if (mi < 30) result = 'sf_out';
      else if (mi === 30) result = 'runner_up';
      else if (mi === 31) result = 'fourth';
    } else {
      if (mi === 30) result = 'champion';
      else if (mi === 31) result = 'third';
    }
  }
  return result;
}

function getJapanFinishText() {
  const r = getJapanFinish();
  const map = {
    group_out: '🇯🇵日本はグループリーグ敗退…',
    r32_out: '🇯🇵日本はベスト32',
    r16_out: '🇯🇵日本はベスト16',
    qf_out: '🇯🇵日本はベスト8進出！',
    sf_out: '🇯🇵日本はベスト4！',
    fourth: '🇯🇵日本はベスト4！',
    third: '🇯🇵日本は3位！🥉',
    runner_up: '🇯🇵日本は準優勝！🥈',
    champion: '🇯🇵日本は優勝！🏆',
  };
  return map[r] || null;
}

function postToX() {
  const champion = getWinner(30);
  const runnerUp = getLoser(30);
  const third = getWinner(31);
  const lines = ['【FIFA World Cup 2026 予想】'];
  if (champion) lines.push(`🏆優勝：${champion.f}${champion.n}`);
  if (runnerUp) lines.push(`🥈準優勝：${runnerUp.f}${runnerUp.n}`);
  if (third) lines.push(`🥉3位：${third.f}${third.n}`);
  const jp = getJapanFinishText();
  if (jp) lines.push(jp);
  lines.push('');
  lines.push('あなたも予想してみよう👇');
  const text = lines.join('\n');
  const url = generateUrl();
  const hashtags = 'FIFAWorldCup2026,WorldCup2026,ワールドカップ,W杯,W杯予想,サッカー日本代表,SAMURAIBLUE';
  const intent = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}&hashtags=${encodeURIComponent(hashtags)}`;
  window.open(intent, '_blank', 'noopener,noreferrer');
}

// ===== BRACKET ZOOM =====
let bracketScale = 1;
function applyBracketScale() {
  const el = document.getElementById('bracket');
  if (el) el.style.zoom = bracketScale;
  const lbl = document.getElementById('zoomLabel');
  if (lbl) lbl.textContent = Math.round(bracketScale * 100) + '%';
}
function zoomBracket(delta) {
  bracketScale = Math.round(Math.min(2, Math.max(0.3, bracketScale + delta)) * 10) / 10;
  applyBracketScale();
}
function resetZoom() {
  bracketScale = 1;
  applyBracketScale();
}
// Pinch-to-zoom
(function() {
  let lastDist = null;
  const wrap = document.querySelector('.bracket-wrap');
  if (!wrap) return;
  wrap.addEventListener('touchstart', e => {
    if (e.touches.length === 2)
      lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }, { passive: true });
  wrap.addEventListener('touchmove', e => {
    if (e.touches.length !== 2 || lastDist === null) return;
    e.preventDefault();
    const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    bracketScale = Math.round(Math.min(2, Math.max(0.3, bracketScale * dist / lastDist)) * 100) / 100;
    lastDist = dist;
    applyBracketScale();
  }, { passive: false });
  wrap.addEventListener('touchend', () => { lastDist = null; }, { passive: true });
})();

// ===== INIT =====
loadFromUrl();
renderGroups();
renderBracket();
</script>
