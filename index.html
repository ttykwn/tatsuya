<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIFA W杯 2026 予想</title>
<style>
:root {
  --bg: #0a0e1a;
  --card: #141828;
  --border: #2a3050;
  --accent: #c8a84b;
  --green: rgba(40,160,40,0.3);
  --yellow: rgba(200,168,0,0.2);
  --red: rgba(160,40,40,0.2);
  --text: #e8eaf0;
  --muted: #7a80a0;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }

header {
  background: linear-gradient(135deg, #001238 0%, #003080 50%, #001238 100%);
  padding: 18px 20px 14px;
  text-align: center;
  border-bottom: 2px solid var(--accent);
}
header h1 { font-size: 1.5rem; color: var(--accent); letter-spacing: 0.05em; }
header p { color: var(--muted); font-size: 0.8rem; margin-top: 4px; }

.tabs {
  display: flex;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  overflow-x: auto;
  position: sticky; top: 0; z-index: 100;
}
.tab {
  padding: 12px 18px;
  cursor: pointer;
  color: var(--muted);
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  font-size: 0.9rem;
  transition: all 0.2s;
  flex-shrink: 0;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover { color: var(--text); }

.tab-pane { display: none; padding: 16px; }
.tab-pane.active { display: block; }

/* Groups */
.groups-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
  gap: 12px;
}
.group-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.group-head {
  background: linear-gradient(90deg, #002060, #003090);
  padding: 8px 14px;
  display: flex; align-items: center; justify-content: space-between;
}
.group-head span { font-size: 1rem; font-weight: bold; color: var(--accent); }
.group-head small { font-size: 0.7rem; color: var(--muted); }
.team-list { padding: 6px; }
.team-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 8px;
  border-radius: 7px;
  margin-bottom: 3px;
  cursor: grab;
  user-select: none;
  border: 1px solid transparent;
  transition: background 0.15s;
}
.team-row:last-child { margin-bottom: 0; }
.team-row.rank-1 { background: var(--green); border-color: rgba(40,160,40,0.4); }
.team-row.rank-2 { background: rgba(30,80,160,0.25); border-color: rgba(30,80,160,0.4); }
.team-row.rank-3 { background: var(--yellow); border-color: rgba(200,168,0,0.3); }
.team-row.rank-4 { background: var(--red); border-color: rgba(160,40,40,0.3); }
.team-row.drag-over { outline: 2px solid var(--accent); }
.rank-num {
  width: 20px; height: 20px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: bold; flex-shrink: 0;
  background: rgba(255,255,255,0.1);
}
.team-flag { font-size: 1.2rem; flex-shrink: 0; line-height: 1; }
.team-name { font-size: 0.8rem; flex: 1; }
.drag-icon { color: var(--muted); font-size: 0.7rem; }
.third-btn {
  font-size: 0.65rem; padding: 2px 7px; border-radius: 10px;
  border: 1px solid rgba(200,168,75,0.4); background: none;
  color: var(--muted); cursor: pointer; white-space: nowrap;
  transition: all 0.2s;
}
.third-btn:hover { border-color: var(--accent); color: var(--accent); }
.third-btn.on { background: rgba(200,168,75,0.15); border-color: var(--accent); color: var(--accent); }

/* Third place */
.third-wrap { max-width: 750px; margin: 0 auto; }
.section-title { font-size: 1rem; color: var(--accent); margin-bottom: 6px; }
.section-sub { font-size: 0.8rem; color: var(--muted); margin-bottom: 14px; }
.counter-badge {
  display: inline-block; padding: 3px 12px;
  border-radius: 20px; border: 1px solid var(--border);
  font-size: 0.8rem; margin-bottom: 14px;
}
.counter-badge.done { border-color: var(--accent); color: var(--accent); }
.third-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 8px;
}
.third-card {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 12px;
  background: var(--card); border: 2px solid var(--border);
  border-radius: 8px; cursor: pointer; transition: all 0.2s;
}
.third-card:hover { border-color: rgba(200,168,75,0.4); }
.third-card.selected { border-color: var(--accent); background: rgba(200,168,75,0.08); }
.third-card.disabled { opacity: 0.35; cursor: not-allowed; }
.third-info { flex: 1; }
.third-name { font-size: 0.8rem; font-weight: 500; }
.third-grp { font-size: 0.7rem; color: var(--muted); }
.third-check { color: var(--accent); visibility: hidden; }
.third-card.selected .third-check { visibility: visible; }

/* Bracket */
.bracket-wrap { overflow-x: auto; padding-bottom: 10px; }
.bracket {
  display: flex;
  gap: 0;
  min-width: 960px;
  align-items: stretch;
}
.bround {
  display: flex; flex-direction: column;
  flex: 1; min-width: 150px;
}
.bround-head {
  text-align: center; padding: 7px 4px;
  font-size: 0.65rem; color: var(--accent);
  font-weight: bold; letter-spacing: 0.08em;
  text-transform: uppercase;
  border-bottom: 1px solid var(--border);
  margin-bottom: 6px;
}
.bmatches {
  display: flex; flex-direction: column;
  justify-content: space-around;
  flex: 1; gap: 6px; padding: 0 4px;
}
.bmatch {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 7px; overflow: hidden;
}
.bteam {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 8px; cursor: pointer; min-height: 34px;
  transition: background 0.15s;
}
.bteam:hover { background: rgba(255,255,255,0.04); }
.bteam:first-child { border-bottom: 1px solid var(--border); }
.bteam.winner { background: rgba(40,160,40,0.2); }
.bteam.loser { opacity: 0.38; }
.bt-flag { font-size: 0.95rem; flex-shrink: 0; }
.bt-name { font-size: 0.72rem; flex: 1; line-height: 1.2; }
.bt-empty { color: var(--muted); font-size: 0.7rem; font-style: italic; }
.bt-win { color: #3c3; font-size: 0.65rem; margin-left: auto; }

/* Final / Champion */
.final-col {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-width: 160px; padding: 0 8px; gap: 10px;
}
.champion-box {
  background: var(--card);
  border: 2px solid var(--accent);
  border-radius: 10px; padding: 14px 10px;
  text-align: center; width: 100%;
}
.champion-box .trophy { font-size: 1.8rem; }
.champ-label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
.champ-name { font-size: 0.9rem; color: var(--accent); font-weight: bold; margin-top: 4px; min-height: 1.2em; }
.third-place-box {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px; text-align: center; width: 100%;
}
.tp-label { font-size: 0.6rem; color: var(--muted); text-transform: uppercase; }
.tp-name { font-size: 0.75rem; margin-top: 3px; min-height: 1em; }
.final-match-wrap { width: 100%; }

/* Share */
.share-wrap { max-width: 560px; margin: 0 auto; }
.share-card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 10px; padding: 18px; margin-bottom: 14px;
}
.share-card h3 { font-size: 0.9rem; margin-bottom: 10px; }
.url-box {
  background: rgba(0,0,0,0.3); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px; font-size: 0.7rem;
  color: var(--muted); word-break: break-all;
  max-height: 72px; overflow-y: auto; margin-bottom: 10px;
}
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: 7px; border: none;
  cursor: pointer; font-size: 0.85rem; font-weight: 500;
  transition: all 0.2s;
}
.btn-gold { background: var(--accent); color: #000; }
.btn-gold:hover { background: #dbb85a; }
.btn-ghost { background: var(--border); color: var(--text); margin-right: 8px; }
.btn-ghost:hover { background: #3a4060; }
.copy-ok { color: #3c3; font-size: 0.8rem; margin-top: 6px; display: none; }
.reset-btn { color: #e04040; background: none; border: 1px solid #e04040; font-size: 0.8rem; padding: 6px 14px; border-radius: 6px; cursor: pointer; }
.reset-btn:hover { background: rgba(224,64,64,0.1); }

@media (max-width: 600px) {
  header h1 { font-size: 1.2rem; }
  .groups-grid { grid-template-columns: 1fr 1fr; }
  .bracket { min-width: 800px; }
}
</style>
</head>
<body>

<header>
  <h1>⚽ FIFA ワールドカップ 2026 予想</h1>
  <p>USA / Canada / Mexico &nbsp;|&nbsp; 48チーム・12グループ</p>
</header>

<nav class="tabs">
  <div class="tab active" onclick="showTab('groups')">🏟️ グループステージ</div>
  <div class="tab" onclick="showTab('bracket')">🏆 ノックアウト</div>
  <div class="tab" onclick="showTab('share')">🔗 共有</div>
</nav>

<div id="tab-groups" class="tab-pane active">
  <div style="font-size:0.78rem;color:var(--muted);margin-bottom:10px;">ドラッグで順位を変更。3位チームの「進出」ボタンで決勝T進出を予想（8チームまで）。<span id="thirdCounter" style="color:var(--accent);margin-left:6px;">3位通過: 0/8</span></div>
  <div class="groups-grid" id="groupsGrid"></div>
</div>

<div id="tab-bracket" class="tab-pane">
  <div style="font-size:0.75rem;color:var(--muted);margin-bottom:10px;">チームをクリックして勝者を選択。もう一度クリックで解除。</div>
  <div class="bracket-wrap">
    <div class="bracket" id="bracket"></div>
  </div>
</div>

<div id="tab-share" class="tab-pane">
  <div class="share-wrap">
    <div class="share-card">
      <h3>予想を共有する</h3>
      <div class="url-box" id="shareUrl">（ここにURLが生成されます）</div>
      <button class="btn btn-gold" onclick="copyUrl()">📋 URLをコピー</button>
      <div class="copy-ok" id="copyOk">✓ コピーしました！</div>
    </div>
    <div class="share-card">
      <h3>リセット</h3>
      <p style="font-size:0.8rem;color:var(--muted);margin-bottom:10px;">全ての予想をリセットします。</p>
      <button class="reset-btn" onclick="resetAll()">🔄 全リセット</button>
    </div>
  </div>
</div>

<script>
// ===== DATA =====
const GROUPS = {
  A: [{n:'Mexico',f:'🇲🇽'},{n:'Czech Republic',f:'🇨🇿'},{n:'South Africa',f:'🇿🇦'},{n:'South Korea',f:'🇰🇷'}],
  B: [{n:'Canada',f:'🇨🇦'},{n:'Bosnia & Herz.',f:'🇧🇦'},{n:'Qatar',f:'🇶🇦'},{n:'Switzerland',f:'🇨🇭'}],
  C: [{n:'Brazil',f:'🇧🇷'},{n:'Morocco',f:'🇲🇦'},{n:'Haiti',f:'🇭🇹'},{n:'Scotland',f:'🏴󠁧󠁢󠁳󠁣󠁴󠁿'}],
  D: [{n:'USA',f:'🇺🇸'},{n:'Paraguay',f:'🇵🇾'},{n:'Australia',f:'🇦🇺'},{n:'Türkiye',f:'🇹🇷'}],
  E: [{n:'Germany',f:'🇩🇪'},{n:'Ivory Coast',f:'🇨🇮'},{n:'Ecuador',f:'🇪🇨'},{n:'Curaçao',f:'🇨🇼'}],
  F: [{n:'Netherlands',f:'🇳🇱'},{n:'Sweden',f:'🇸🇪'},{n:'Tunisia',f:'🇹🇳'},{n:'Japan',f:'🇯🇵'}],
  G: [{n:'Belgium',f:'🇧🇪'},{n:'Egypt',f:'🇪🇬'},{n:'Iran',f:'🇮🇷'},{n:'New Zealand',f:'🇳🇿'}],
  H: [{n:'Spain',f:'🇪🇸'},{n:'Saudi Arabia',f:'🇸🇦'},{n:'Uruguay',f:'🇺🇾'},{n:'Cape Verde',f:'🇨🇻'}],
  I: [{n:'France',f:'🇫🇷'},{n:'Senegal',f:'🇸🇳'},{n:'Iraq',f:'🇮🇶'},{n:'Norway',f:'🇳🇴'}],
  J: [{n:'Argentina',f:'🇦🇷'},{n:'Algeria',f:'🇩🇿'},{n:'Austria',f:'🇦🇹'},{n:'Jordan',f:'🇯🇴'}],
  K: [{n:'Portugal',f:'🇵🇹'},{n:'DR Congo',f:'🇨🇩'},{n:'Uzbekistan',f:'🇺🇿'},{n:'Colombia',f:'🇨🇴'}],
  L: [{n:'England',f:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},{n:'Croatia',f:'🇭🇷'},{n:'Ghana',f:'🇬🇭'},{n:'Panama',f:'🇵🇦'}],
};
const GKEYS = ['A','B','C','D','E','F','G','H','I','J','K','L'];

// R32 bracket: [slot1, slot2]
// slots: '1X' = 1st in group X, '2X' = 2nd, 't3N' = Nth advancing 3rd-place
const R32_DEF = [
  ['1A','t30'],['1B','t31'],['1C','2F'],['2A','2B'],   // left, matches 0-3
  ['1D','t32'],['1E','t33'],['1H','2J'],['2D','2G'],   // left, matches 4-7
  ['1F','2C'], ['2E','2I'], ['1G','t34'],['1I','t35'], // right, matches 8-11
  ['1J','t36'],['1K','t37'],['1L','2H'], ['2K','2L'],  // right, matches 12-15
];

// ===== STATE =====
let rankings = {};
GKEYS.forEach(g => rankings[g] = [0,1,2,3]);
let thirdAdvancing = [];   // array of group keys (max 8)
let bracketPicks = new Array(32).fill(null); // 0 or 1 per match index

// ===== HELPERS =====
function getTeam(slot) {
  if (!slot) return null;
  if (slot.startsWith('t3')) {
    const i = parseInt(slot.slice(2));
    if (i >= thirdAdvancing.length) return null;
    const g = thirdAdvancing[i];
    const idx = rankings[g][2];
    return GROUPS[g][idx];
  }
  const pos = parseInt(slot[0]) - 1;
  const g = slot[1];
  if (!rankings[g]) return null;
  const idx = rankings[g][pos];
  return GROUPS[g][idx];
}

// Match tree: R32(0-15), R16(16-23), QF(24-27), SF(28-29), Final(30), 3rd(31)
function getMatchTeams(matchIdx) {
  if (matchIdx < 16) {
    const def = R32_DEF[matchIdx];
    return [getTeam(def[0]), getTeam(def[1])];
  }
  if (matchIdx < 24) {
    const base = (matchIdx - 16) * 2;
    return [getWinner(base), getWinner(base + 1)];
  }
  if (matchIdx < 28) {
    const base = 16 + (matchIdx - 24) * 2;
    return [getWinner(base), getWinner(base + 1)];
  }
  if (matchIdx === 28) return [getWinner(24), getWinner(25)];
  if (matchIdx === 29) return [getWinner(26), getWinner(27)];
  if (matchIdx === 30) return [getWinner(28), getWinner(29)];
  if (matchIdx === 31) return [getLoser(28), getLoser(29)];
  return [null, null];
}

function getWinner(matchIdx) {
  const pick = bracketPicks[matchIdx];
  if (pick === null) return null;
  return getMatchTeams(matchIdx)[pick];
}

function getLoser(matchIdx) {
  const pick = bracketPicks[matchIdx];
  if (pick === null) return null;
  return getMatchTeams(matchIdx)[1 - pick];
}

// Invalidate dependent picks when a team in a match changes
function clearDependentPicks(matchIdx) {
  const deps = getDependentMatches(matchIdx);
  deps.forEach(i => {
    if (bracketPicks[i] !== null) {
      bracketPicks[i] = null;
      clearDependentPicks(i);
    }
  });
}

function getDependentMatches(matchIdx) {
  if (matchIdx < 16) return [16 + Math.floor(matchIdx / 2)];
  if (matchIdx < 24) return [24 + Math.floor((matchIdx - 16) / 2)];
  if (matchIdx < 28) return [28 + Math.floor((matchIdx - 24) / 2)];
  if (matchIdx === 28 || matchIdx === 29) return [30, 31];
  return [];
}

// ===== RENDER GROUPS =====
function renderGroups() {
  const el = document.getElementById('groupsGrid');
  el.innerHTML = GKEYS.map(g => renderGroupCard(g)).join('');
  setupGroupDrag();
}

function renderGroupCard(g) {
  const teams = rankings[g].map((idx, pos) => {
    const t = GROUPS[g][idx];
    const cls = ['rank-1','rank-2','rank-3','rank-4'][pos];
    const isThird = pos === 2;
    const advancing = thirdAdvancing.includes(g);
    const thirdFull = thirdAdvancing.length >= 8;
    const thirdBtn = isThird
      ? `<button class="third-btn ${advancing ? 'on' : ''}" onclick="toggleThird('${g}');event.stopPropagation();" ${!advancing && thirdFull ? 'disabled style="opacity:0.3"' : ''}>${advancing ? '✓ 進出' : '進出?'}</button>`
      : '';
    return `<div class="team-row ${cls}" draggable="true" data-group="${g}" data-pos="${pos}">
      <span class="rank-num">${pos+1}</span>
      <span class="team-flag">${t.f}</span>
      <span class="team-name">${t.n}</span>
      ${thirdBtn}
      <span class="drag-icon">⠿</span>
    </div>`;
  }).join('');
  return `<div class="group-card">
    <div class="group-head"><span>グループ ${g}</span><small>${rankings[g].map(i=>GROUPS[g][i].n).slice(0,2).join(' / ')} 通過予想</small></div>
    <div class="team-list" id="tl-${g}">${teams}</div>
  </div>`;
}

let dragSrc = null;
function setupGroupDrag() {
  document.querySelectorAll('.team-row').forEach(row => {
    row.addEventListener('dragstart', e => {
      dragSrc = {g: row.dataset.group, pos: parseInt(row.dataset.pos)};
      row.style.opacity = '0.4';
    });
    row.addEventListener('dragend', e => { row.style.opacity = ''; });
    row.addEventListener('dragover', e => { e.preventDefault(); row.classList.add('drag-over'); });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', e => {
      e.preventDefault();
      row.classList.remove('drag-over');
      if (!dragSrc) return;
      const destG = row.dataset.group;
      const destPos = parseInt(row.dataset.pos);
      if (dragSrc.g !== destG || dragSrc.pos === destPos) return;
      const arr = rankings[destG];
      const tmp = arr[dragSrc.pos];
      arr[dragSrc.pos] = arr[destPos];
      arr[destPos] = tmp;
      bracketPicks = new Array(32).fill(null);
      renderGroups();
      renderBracket();
      saveState();
    });
  });
}

// ===== UPDATE THIRD COUNTER =====
function renderThird() {
  const counter = document.getElementById('thirdCounter');
  if (counter) {
    const n = thirdAdvancing.length;
    counter.textContent = `3位通過: ${n}/8`;
    counter.style.color = n === 8 ? 'var(--accent)' : 'var(--muted)';
  }
}

function toggleThird(g) {
  const idx = thirdAdvancing.indexOf(g);
  if (idx >= 0) {
    thirdAdvancing.splice(idx, 1);
    bracketPicks = new Array(32).fill(null);
  } else {
    if (thirdAdvancing.length >= 8) return;
    thirdAdvancing.push(g);
  }
  renderGroups();
  renderThird();
  renderBracket();
  saveState();
}

// ===== RENDER BRACKET =====
function renderBracket() {
  const el = document.getElementById('bracket');

  // Left R32 (0-7), Left R16 (16-19), Left QF (24-25), Left SF (28)
  // Right R32 (8-15), Right R16 (20-23), Right QF (26-27), Right SF (29)
  // Final (30), 3rd (31)

  const leftR32  = [0,1,2,3,4,5,6,7];
  const leftR16  = [16,17,18,19];
  const leftQF   = [24,25];
  const leftSF   = [28];
  const rightR32 = [8,9,10,11,12,13,14,15];
  const rightR16 = [20,21,22,23];
  const rightQF  = [26,27];
  const rightSF  = [29];

  el.innerHTML = [
    makeRoundCol('ラウンド32', leftR32),
    makeRoundCol('ラウンド16', leftR16),
    makeRoundCol('準々決勝', leftQF),
    makeRoundCol('準決勝', leftSF),
    makeFinalCol(),
    makeRoundCol('準決勝', rightSF),
    makeRoundCol('準々決勝', rightQF),
    makeRoundCol('ラウンド16', rightR16),
    makeRoundCol('ラウンド32', rightR32),
  ].join('');

  document.querySelectorAll('.bteam[data-match]').forEach(el => {
    el.addEventListener('click', () => {
      const mi = parseInt(el.dataset.match);
      const side = parseInt(el.dataset.side);
      if (el.classList.contains('winner')) {
        bracketPicks[mi] = null;
        clearDependentPicks(mi);
      } else {
        const [t1, t2] = getMatchTeams(mi);
        if (!t1 || !t2) return;
        bracketPicks[mi] = side;
        clearDependentPicks(mi);
      }
      renderBracket();
      saveState();
    });
  });
}

function makeRoundCol(title, matchIndices) {
  const matches = matchIndices.map(mi => {
    const [t1, t2] = getMatchTeams(mi);
    const pick = bracketPicks[mi];
    return `<div class="bmatch">
      ${makeTeamSlot(t1, mi, 0, pick)}
      ${makeTeamSlot(t2, mi, 1, pick)}
    </div>`;
  }).join('');
  return `<div class="bround">
    <div class="bround-head">${title}</div>
    <div class="bmatches">${matches}</div>
  </div>`;
}

function makeTeamSlot(team, mi, side, pick) {
  if (!team) {
    return `<div class="bteam" data-match="${mi}" data-side="${side}">
      <span class="bt-empty">TBD</span>
    </div>`;
  }
  let cls = '';
  if (pick === side) cls = 'winner';
  else if (pick !== null) cls = 'loser';
  return `<div class="bteam ${cls}" data-match="${mi}" data-side="${side}">
    <span class="bt-flag">${team.f}</span>
    <span class="bt-name">${team.n}</span>
    ${pick === side ? '<span class="bt-win">✓</span>' : ''}
  </div>`;
}

function makeFinalCol() {
  const champion = getWinner(30);
  const third = getWinner(31);
  const [ft1, ft2] = getMatchTeams(30);
  const [tp1, tp2] = getMatchTeams(31);
  const fpick = bracketPicks[30];
  const tpick = bracketPicks[31];
  return `<div class="final-col">
    <div class="champion-box">
      <div class="trophy">🏆</div>
      <div class="champ-label">優勝予想</div>
      <div class="champ-name">${champion ? champion.f+' '+champion.n : '—'}</div>
    </div>
    <div class="final-match-wrap">
      <div class="bround-head" style="margin-bottom:4px">決勝</div>
      <div class="bmatch">
        ${makeTeamSlot(ft1, 30, 0, fpick)}
        ${makeTeamSlot(ft2, 30, 1, fpick)}
      </div>
    </div>
    <div class="final-match-wrap">
      <div class="bround-head" style="margin-bottom:4px">3位決定戦</div>
      <div class="bmatch">
        ${makeTeamSlot(tp1, 31, 0, tpick)}
        ${makeTeamSlot(tp2, 31, 1, tpick)}
      </div>
    </div>
    <div class="third-place-box">
      <div class="tp-label">3位予想</div>
      <div class="tp-name">${third ? third.f+' '+third.n : '—'}</div>
    </div>
  </div>`;
}

// ===== SHARE =====
function generateUrl() {
  const data = {
    r: {},
    t: thirdAdvancing,
    b: bracketPicks,
  };
  GKEYS.forEach(g => data.r[g] = rankings[g]);
  const json = JSON.stringify(data);
  const b64 = btoa(unescape(encodeURIComponent(json)));
  return location.href.split('?')[0] + '?p=' + b64;
}

function loadFromUrl() {
  const params = new URLSearchParams(location.search);
  const p = params.get('p');
  if (!p) return;
  try {
    const json = decodeURIComponent(escape(atob(p)));
    const data = JSON.parse(json);
    if (data.r) GKEYS.forEach(g => { if (data.r[g]) rankings[g] = data.r[g]; });
    if (data.t) thirdAdvancing = data.t;
    if (data.b) bracketPicks = data.b;
  } catch(e) { console.error('Failed to load state from URL', e); }
}

function saveState() {
  const url = generateUrl();
  document.getElementById('shareUrl').textContent = url;
  try { history.replaceState(null, '', url); } catch(e) {}
}

function copyUrl() {
  const url = generateUrl();
  navigator.clipboard.writeText(url).then(() => {
    const ok = document.getElementById('copyOk');
    ok.style.display = 'block';
    setTimeout(() => ok.style.display = 'none', 2000);
  }).catch(() => {
    prompt('URLをコピーしてください:', url);
  });
}

function resetAll() {
  if (!confirm('全ての予想をリセットしますか？')) return;
  GKEYS.forEach(g => rankings[g] = [0,1,2,3]);
  thirdAdvancing = [];
  bracketPicks = new Array(32).fill(null);
  renderGroups();
  renderBracket();
  saveState();
}

// ===== TABS =====
function showTab(id) {
  document.querySelectorAll('.tab-pane').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  const tabs = ['groups','bracket','share'];
  const i = tabs.indexOf(id);
  document.querySelectorAll('.tab')[i].classList.add('active');
  if (id === 'share') saveState();
}

// ===== INIT =====
loadFromUrl();
renderGroups();
renderBracket();
</script>
</body>
</html>
